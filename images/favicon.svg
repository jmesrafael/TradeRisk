<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Outer accent ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#c0c0c0" stroke-width="1.5" opacity="0.4"/>

  <!-- Shield base with gradient -->
  <path d="M 100 35 L 145 60 Q 145 95 100 135 Q 55 95 55 60 Z"
        fill="url(#shieldGrad)"
        stroke="#c0c0c0"
        stroke-width="2.5"
        stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- Inner shield detail -->
  <path d="M 100 45 L 135 65 Q 135 90 100 125 Q 65 90 65 65 Z"
        fill="none"
        stroke="#6a6a6a"
        stroke-width="1"
        opacity="0.5"/>

  <!-- Upward trending arrow inside shield -->
  <g transform="translate(100, 95)">
    <!-- Arrow line -->
    <polyline points="-20,-15 0,0 20,-20"
              fill="none"
              stroke="#0a0a0a"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"/>
  </g>

  <!-- Dollar sign accent -->
  <g transform="translate(100, 135)">
    <text x="0" y="0"
          font-size="22"
          font-weight="900"
          fill="#c0c0c0"
          text-anchor="middle"
          dominant-baseline="middle"
          font-family="Arial, sans-serif"
          opacity="0.8">$</text>
  </g>

  <!-- Top accent dot -->
  <circle cx="100" cy="28" r="2.5" fill="#c0c0c0" opacity="0.6"/>
</svg>