<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0a0a" stroke="#c0c0c0" stroke-width="2"/>

  <!-- Shield shape - represents protection/risk management -->
  <path d="M 100 40 L 140 60 L 140 120 Q 100 150 100 150 Q 60 150 60 120 L 60 60 Z" fill="none" stroke="#c0c0c0" stroke-width="3" stroke-linejoin="round"/>

  <!-- Upward trending line inside shield -->
  <path d="M 75 125 L 85 110 L 100 125 L 115 95 L 130 110" fill="none" stroke="#c0c0c0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dollar sign accent -->
  <text x="100" y="155" font-size="24" font-weight="bold" fill="#c0c0c0" text-anchor="middle" dominant-baseline="middle">$</text>
</svg>